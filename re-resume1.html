<!DOCTYPE html>
<html lang="zh-TW">
<head>施芷崴
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施芷崴的個人履歷 - 114018092</title>
    <style>應徵履歷
        /* CSS 樣式設定 */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; color: var(--primary-color); }
        .student-id { color: var(--accent-color); font-weight: bold; }

        section { margin-bottom: 25px; }
        h2 {
            border-left: 5px solid var(--accent-color);
            padding-left: 10px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .skill-tag {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px 2px;
            font-size: 0.9rem;
        }

        #contact-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #contact-btn:hover { background-color: #2980b9; }

        .hidden-info { display: none; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>施芷崴 <small>(姓名範例)</small></h1>
        <p>學號：<span class="student-id">114018092</span></p>
        <p>求職意向：家教 餐飲</p>
    </header>

    <section>
        <h2>關於我</h2>
        <p>我是一名對技術充滿熱情的學生，學號為 114018092。擅長解決問題。</p>
    </section>

    <section>
        <h2>專業技能</h2>
        <div id="skills-container">
            </div>
    </section>

    <section>
        <h2>學歷與經歷</h2>
        <ul>
            <li><strong>亞洲大學 - 聽語系</strong> (2025 - 至今)</li>
            <li><strong>校園專案：</strong> 無</li>
            <li><strong>社團經驗：</strong> 無</li>
        </ul>
    </section>

    <section style="text-align: center;">
        <button id="contact-btn">顯示聯繫方式</button>
        <div id="info" class="hidden-info">
            Email: student114018092@example.edu.tw <br>
            GitHub: github.com/user114018092
        </div>
    </section>
</div>

<script>
    // JavaScript 功能
    document.addEventListener('DOMContentLoaded', () => {
        // 1. 動態生成技能標籤
        const skills = ['HTML5', 'CSS3', 'JavaScript', 'React', 'Git', 'Python'];
        const container = document.getElementById('skills-container');
        
        skills.forEach(skill => {
            const span = document.createElement('span');
            span.className = 'skill-tag';
            span.innerText = skill;
            container.appendChild(span);
        });

        // 2. 按鈕點擊交互
        const btn = document.getElementById('contact-btn');
        const info = document.getElementById('info');

        btn.addEventListener('click', () => {
            if (info.style.display === 'block') {
                info.style.display = 'none';
                btn.innerText = '顯示聯繫方式';
            } else {
                info.style.display = 'block';
                btn.innerText = '隱藏聯繫方式';
                console.log("查閱學號 114018092 的聯繫資訊");
            }
        });
    });
</script>

</body>
</html>
